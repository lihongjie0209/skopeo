name: Build & Release

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to build (e.g. v1.17.0). Leave empty for latest upstream'
        required: false

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  UPSTREAM_REPO: https://github.com/containers/skopeo.git

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      build_version: ${{ steps.resolve.outputs.build_version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: resolve
        run: |
          case "${{ github.event_name }}" in
            workflow_dispatch)
              if [ -n "${{ github.event.inputs.version }}" ]; then
                # Manual build with explicit version
                VER="${{ github.event.inputs.version }}"
                echo "build_version=${VER}" >> "$GITHUB_OUTPUT"
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "Manual build: ${VER}"
              else
                # Manual build without version: build latest upstream tag
                git remote add upstream "${{ env.UPSTREAM_REPO }}"
                git fetch upstream --tags --force
                VER=$(git tag -l 'v*' --sort=-v:refname | head -1)
                echo "build_version=${VER}" >> "$GITHUB_OUTPUT"
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "Manual build (no version specified): latest upstream ${VER}"
              fi
              ;;
            schedule)
              git remote add upstream "${{ env.UPSTREAM_REPO }}"
              git fetch upstream --tags --force

              VER=$(git tag -l 'v*' --sort=-v:refname | head -1)
              echo "Latest upstream tag: ${VER}"

              if git rev-parse -q --verify "refs/tags/${VER}" >/dev/null 2>&1; then
                if gh release view "${VER}" &>/dev/null; then
                  echo "Release already exists for ${VER}, skipping"
                  echo "should_build=false" >> "$GITHUB_OUTPUT"
                else
                  echo "Tag exists but no release, will build ${VER}"
                  echo "build_version=${VER}" >> "$GITHUB_OUTPUT"
                  echo "should_build=true" >> "$GITHUB_OUTPUT"
                fi
              else
                echo "New upstream tag: ${VER}, syncing and building"
                echo "build_version=${VER}" >> "$GITHUB_OUTPUT"
                echo "should_build=true" >> "$GITHUB_OUTPUT"
              fi
              ;;
          esac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream branches and tags to fork
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }}
          git fetch upstream main
          git merge upstream/main --no-edit
          git push origin main
          git push origin --tags --force

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_build == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: skopeo-linux-amd64
            desc: Linux amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: skopeo-linux-arm64
            desc: Linux arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: skopeo-windows-amd64.exe
            desc: Windows amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout build version
        shell: bash
        run: |
          VER="${{ needs.resolve-version.outputs.build_version }}"
          if ! git rev-parse -q --verify "refs/tags/${VER}" >/dev/null; then
            git fetch origin --tags --force
          fi
          git checkout "refs/tags/${VER}"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Build (${{ matrix.desc }})
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build \
            -tags "containers_image_openpgp" \
            -ldflags="-s -w" \
            -o "${{ matrix.artifact }}" \
            ./cmd/skopeo

      - name: Unit tests (Linux)
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          go test -tags "containers_image_openpgp" -timeout=60s ./cmd/skopeo/...

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [resolve-version, build]
    if: needs.resolve-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Checksums
        shell: bash
        run: |
          find . -name 'skopeo-*' -type f | sort | xargs sha256sum > checksums.txt
          cat checksums.txt

      - name: Create or update GitHub Release
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.build_version }}"
          RELEASE_NOTES=$(cat <<-EOM
          Auto-built from upstream [containers/skopeo](${{ env.UPSTREAM_REPO }}) tag \`${VERSION}\`.

          ## Downloads

          | File | Description |
          |------|-------------|
          | \`skopeo-linux-amd64\` | Linux amd64 (fully static, works on CentOS 7+) |
          | \`skopeo-linux-arm64\` | Linux arm64 (fully static, works on CentOS 7+) |
          | \`skopeo-windows-amd64.exe\` | Windows amd64 |
          | \`checksums.txt\` | SHA256 checksums |

          > Linux builds use \`CGO_ENABLED=0\` + build tag \`containers_image_openpgp\` for full glibc portability. No gpgme dependency.
          EOM
          )

          ASSETS=$(find . -name 'skopeo-*' -type f | tr '\n' ' ')
          ASSETS="$ASSETS checksums.txt"

          if gh release view "${VERSION}" &>/dev/null; then
            echo "Updating existing release ${VERSION}..."
            gh release upload "${VERSION}" $ASSETS --clobber
          else
            echo "Creating release ${VERSION}..."
            gh release create "${VERSION}" \
              --title "Skopeo ${VERSION}" \
              --notes "${RELEASE_NOTES}" \
              $ASSETS
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
